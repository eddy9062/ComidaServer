version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_DB: comida_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Atilas123*

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "8080:80"

    networks:
      - backend-network

volumes:
  postgres_data:

networks:
  backend-network:
    driver: bridge
